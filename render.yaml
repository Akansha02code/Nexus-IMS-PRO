services:
  - type: web
    name: nexus-ims-backend
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Xmx256m -Xms128m -jar ims-backend/target/ims-0.0.1-SNAPSHOT.jar --spring.profiles.active=render
    healthCheckPath: /api/health
    healthCheckInterval: 30
    healthCheckTimeout: 5
    healthCheckUnhealthyThreshold: 3
    
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-ims-db
          property: connectionString
      
      - key: DB_USER
        value: postgres
      
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: nexus-ims-db
          property: connectionString
      
      - key: JWT_SECRET
        sync: false
      
      - key: CORS_ORIGINS
        value: https://your-frontend.onrender.com,http://localhost:5173
      
      - key: SPRING_PROFILES_ACTIVE
        value: render
      
      - key: PORT
        value: 8080

    routes:
      - path: /api
        matchType: prefix

databases:
  - name: nexus-ims-db
    databaseName: nexus_ims_db
    username: postgres
    plan: free
    region: oregon
