databases:
  - name: nexus-ims-db
    databaseName: nexus_ims_db
    plan: free
    region: oregon
    version: "15"

services:
  - type: web
    name: nexus-ims-backend
    env: java
    plan: free
    rootDir: ims-backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Xmx256m -Xms128m -jar target/ims-0.0.1-SNAPSHOT.jar --spring.profiles.active=render
    healthCheckPath: /api/actuator/health
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: nexus-ims-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: nexus-ims-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: nexus-ims-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-frontend.onrender.com
      - key: SPRING_PROFILES_ACTIVE
        value: render
